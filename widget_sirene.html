<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Validation SIREN</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    body { font-family: sans-serif; padding: 16px; }
    button { padding: 10px 14px; cursor: pointer; margin-right: 6px; }
    .info { margin-top: 12px; font-size: 14px; }
    .ok { color: green; }
    .ko { color: crimson; }
  </style>
</head>

<body>
  <h2>Validation SIREN</h2>

  <button id="checkAll">Contrôler tous les SIREN</button>
  <button id="checkSelected">Contrôler la ligne sélectionnée</button>

  <div id="status" class="info"></div>

  <script>
    grist.ready({
      requiredAccess: "full",
      columns: [
        "siren_declare",
        "siren_api",
        "validite_siren",
        "raison_sociale_api",
        "code_ape_api",
        "etat_administratif_api",
        "date_controle_siren",
        "message_controle_siren"
      ]
    });

    let records = [];
    let selectedRecord = null;
    let tableId = null;

    grist.onRecords(function(data) {
      records = data || [];
    });

    grist.onRecord(function(record) {
      selectedRecord = record;
    });

    grist.onOptions(function(options, interaction) {
      tableId = interaction.tableId;
    });

    function cleanSiren(value) {
      return String(value || "").replace(/\D/g, "");
    }

    async function checkSiren(siren) {
      const cleaned = cleanSiren(siren);

      if (!cleaned) {
        return {
          siren_api: "",
          validite_siren: "SIREN manquant",
          message_controle_siren: "Aucun SIREN renseigné"
        };
      }

      if (!/^\d{9}$/.test(cleaned)) {
        return {
          siren_api: "",
          validite_siren: "Format invalide",
          message_controle_siren: "Le SIREN doit contenir exactement 9 chiffres"
        };
      }

      const url =
        "https://recherche-entreprises.api.gouv.fr/search?q=" +
        encodeURIComponent(cleaned);

      try {
        const response = await fetch(url);

        if (!response.ok) {
          return {
            siren_api: "",
            validite_siren: "Erreur API",
            message_controle_siren: "Erreur HTTP " + response.status
          };
        }

        const data = await response.json();
        const results = data.results || [];

        if (results.length === 0) {
          return {
            siren_api: "",
            validite_siren: "SIREN introuvable",
            message_controle_siren: "Aucun résultat retourné par l'API"
          };
        }

        const result = results[0];
        const sirenRetourne = String(result.siren || "");
        const nbEtablissements = Number(result.nombre_etablissements || 0);
        const nbEtablissementsOuverts = Number(result.nombre_etablissements_ouverts || 0);

        const raisonSociale =
          result.nom_complet ||
          result.nom_raison_sociale ||
          "";

        const codeApe = result.activite_principale || "";
        const etatAdministratif = result.etat_administratif || "";

        if (sirenRetourne !== cleaned) {
          return {
            siren_api: sirenRetourne,
            validite_siren: "Discordance",
            raison_sociale_api: raisonSociale,
            code_ape_api: codeApe,
            etat_administratif_api: etatAdministratif,
            message_controle_siren:
              "Le SIREN retourné par l'API diffère du SIREN déclaré"
          };
        }

        if (nbEtablissements === 0 && nbEtablissementsOuverts === 0 && !raisonSociale) {
          return {
            siren_api: sirenRetourne,
            validite_siren: "SIREN inexploitable",
            raison_sociale_api: "",
            code_ape_api: "",
            etat_administratif_api: "",
            message_controle_siren:
              "SIREN retourné par l'API mais sans établissement ni raison sociale exploitable"
          };
        }

        if (nbEtablissementsOuverts === 0) {
          return {
            siren_api: sirenRetourne,
            validite_siren: "SIREN sans établissement ouvert",
            raison_sociale_api: raisonSociale,
            code_ape_api: codeApe,
            etat_administratif_api: etatAdministratif,
            message_controle_siren:
              "SIREN trouvé, mais aucun établissement ouvert n'est recensé"
          };
        }

        return {
          siren_api: sirenRetourne,
          validite_siren: "SIREN valide",
          raison_sociale_api: raisonSociale,
          code_ape_api: codeApe,
          etat_administratif_api: etatAdministratif,
          message_controle_siren:
            "Correspondance exacte avec au moins un établissement ouvert"
        };

      } catch (e) {
        return {
          siren_api: "",
          validite_siren: "Erreur API",
          message_controle_siren: e.message
        };
      }
    }

    async function updateRecord(record) {
      if (!tableId) {
        document.getElementById("status").innerHTML =
          '<span class="ko">Erreur : table source non détectée.</span>';
        return;
      }

      const result = await checkSiren(record.siren_declare);
      const now = new Date().toISOString();

      await grist.docApi.applyUserActions([
        ["UpdateRecord", tableId, record.id, {
          siren_api: result.siren_api || "",
          validite_siren: result.validite_siren || "",
          raison_sociale_api: result.raison_sociale_api || "",
          code_ape_api: result.code_ape_api || "",
          etat_administratif_api: result.etat_administratif_api || "",
          date_controle_siren: now,
          message_controle_siren: result.message_controle_siren || ""
        }]
      ]);
    }

    async function checkAll() {
      document.getElementById("status").textContent = "Contrôle en cours...";
      let count = 0;

      for (const record of records) {
        await updateRecord(record);
        count++;
      }

      document.getElementById("status").innerHTML =
        '<span class="ok">Contrôle terminé : ' + count + ' ligne(s) traitée(s).</span>';
    }

    async function checkSelected() {
      if (!selectedRecord || !selectedRecord.id) {
        document.getElementById("status").innerHTML =
          '<span class="ko">Aucune ligne sélectionnée.</span>';
        return;
      }

      document.getElementById("status").textContent =
        "Contrôle de la ligne sélectionnée...";

      await updateRecord(selectedRecord);

      document.getElementById("status").innerHTML =
        '<span class="ok">Ligne sélectionnée contrôlée.</span>';
    }

    document.getElementById("checkAll").addEventListener("click", checkAll);
    document.getElementById("checkSelected").addEventListener("click", checkSelected);
  </script>
</body>
</html>
